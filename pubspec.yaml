name: amap_app
description: Application de gestion de paniers AMAP - capture photo, OCR, comparaison prix bio/conventionnel, analytics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Supabase
  supabase_flutter: ^2.5.6

  # OCR
  google_mlkit_text_recognition: ^0.13.1

  # Charts
  fl_chart: ^0.68.0

  # HTTP client
  dio: ^5.7.0

  # Code generation (models)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # SQLite local cache
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
