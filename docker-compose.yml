services:
  amap-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set these in Dokploy > Service > Build Args (not Env Vars)
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    image: amap-web:latest
    restart: unless-stopped
    # Must be on dokploy-network so Traefik can reach the container.
    # Domain routing is configured in Dokploy UI > Domains tab (port 80).
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dokploy-network:
    external: true
