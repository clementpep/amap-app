services:
  amap-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set these in Dokploy > Service > Build Args (not Env Vars)
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    image: amap-web:latest
    restart: unless-stopped
    # APP_HOST = domain only, no https:// prefix (e.g. amap.clementpep.cloud)
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.amap.rule=Host(`${APP_HOST:-amap.example.com}`)"
      - "traefik.http.routers.amap.entrypoints=websecure"
      - "traefik.http.routers.amap.tls.certresolver=letsencrypt"
      - "traefik.http.services.amap.loadbalancer.server.port=80"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.amap-http.rule=Host(`${APP_HOST:-amap.example.com}`)"
      - "traefik.http.routers.amap-http.entrypoints=web"
      - "traefik.http.routers.amap-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dokploy-network:
    external: true
